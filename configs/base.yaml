seed: 42
deterministic: true

data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  train_split: "train"
  eval_split: "test"
  max_train_samples: null
  max_eval_samples: 10000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  bf16: true
  fp16: false
  logging_steps: 50
  phases:
    embedding_alignment:        # Phase 1
      enabled: true
      datasets: ["arabic_squad"]
      trainable_parameters:
        - "embed_tokens"
        - "lm_head"
      steps: 1000
      learning_rate: 1.0e-3
      batch_size: 8
      gradient_accumulation_steps: 1
      optimizer: "adamw"
      weight_decay: 0.0
      max_length: 512
      loss_target: "full_sequence"
      lr_scheduler: "constant"
      warmup_steps: 0
      max_grad_norm: 1.0
      save_checkpoint: true

    warmup:                     # Phase 2
      enabled: true
      datasets: ["arabic_squad"]
      trainable_parameters: ["*"]
      steps: 2000
      learning_rate: 2.0e-4
      batch_size: 4
      gradient_accumulation_steps: 4
      optimizer: "adamw"
      weight_decay: 0.01
      max_length: 512
      loss_target: "answer_only"
      lr_scheduler: "cosine"
      warmup_steps: 100
      max_grad_norm: 1.0
      save_checkpoint: true

    sft:                        # Phase 3
      enabled: true
      datasets: ["tydiqa_arabic", "arcd"]
      trainable_parameters: ["*"]
      steps: 2000
      learning_rate: 2.0e-4
      batch_size: 4
      gradient_accumulation_steps: 4
      optimizer: "adamw"
      weight_decay: 0.01
      max_length: 512
      loss_target: "answer_only"
      lr_scheduler: "cosine"
      warmup_steps: 100
      max_grad_norm: 1.0
      save_checkpoint: true
      early_stopping:
        enabled: true
        metric: "eval_loss"
        eval_every_n_steps: 200
        patience: 5
        min_delta: 5.0e-4
        min_steps_before_stop: 500
        restore_best_at_end: true
        eval_splits:
          tydiqa_arabic: "validation"
          arcd: "validation"

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null
  generation_max_new_tokens: 128
  generation_temperature: 1.0
  generation_do_sample: false
  failure_reports: false
  score_normalization: "char"

tracking:
  use_wandb: false
  wandb_project: "arabic-tokenizer-eval"
  log_to_file: true
