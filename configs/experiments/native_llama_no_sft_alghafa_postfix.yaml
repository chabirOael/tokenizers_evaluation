# Post-fix verification of baseline (a) — alghafa only.
#
# Tests just the Alghafa task with the native Llama tokenizer + native
# pretrained weights, NO SFT. Validates the 2026-05-03 parser + scoring
# fix:
#   * label is now read 0-indexed (was off-by-one; recovered ~36 % dropped rows)
#   * sol5 picked up by the 2 grounded-statement sub-configs
#   * T/F + 2/3-way sentiment sub-configs scored word-wise (LightEval-style)
#   * char-norm on _aggregate_scores (LogProbCharNorm equivalent)
#   * per_subconfig_accuracy emitted in all_metrics.json
#
# Pre-fix native_llama no-SFT alghafa accuracy: 0.3275 on 13K examples.
# Post-fix expectation: meaningfully different (larger eval pool ~22.7K,
# corrected golds, word-scored sub-configs). per_subconfig_accuracy should
# show a 9-bucket breakdown.

experiment:
  name: "native_llama_no_sft_alghafa_postfix"
  description: >
    Alghafa-only re-run with native Llama tokenizer, NO SFT, after the
    parser/scoring fix. Pairs with
    outputs/experiments/native_llama_no_sft_benchmark_sweep/native_llama_alghafa/
    for the pre-fix baseline.
  output_dir: "outputs/experiments/native_llama_no_sft_alghafa_postfix"
  seed: 42

data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3
  ft:
    enabled: false   # NO SFT

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null
  failure_reports: true

sweep:
  tokenizers:
    - type: "native_llama"
      vocab_sizes: [null]
      params:
        model_name_or_path: "meta-llama/Llama-3.2-1B"

  tasks:
    - type: "alghafa"
      params:
        dataset_name: "OALL/AlGhafa-Arabic-LLM-Benchmark-Native"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42
