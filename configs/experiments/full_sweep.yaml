experiment:
  name: "full_sweep"
  description: "All tokenizers x all tasks x vocab sizes (16K, 32K, 50K)"
  output_dir: "outputs/experiments/full_sweep"

sweep:
  tokenizers:
    - type: "bpe"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "morpho_bpe"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "wordpiece"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "character_bert"
      vocab_sizes: [null]
      params:
        max_char_len: 50
        max_word_vocab: 50000
    - type: "char_jaber"
      vocab_sizes: [null]
      params: {}
  tasks:
    - type: "text_generation"
      params:
        max_length: 512
        stride: 256
    - type: "question_answering"
      params:
        max_length: 512
        max_new_tokens: 64
        dataset_name: "hsseinmz/arcd"
