experiment:
  name: "full_sweep"
  description: "All tokenizers x LightEval benchmarks x vocab sizes (16K, 32K, 50K)"
  output_dir: "outputs/experiments/full_sweep"

sweep:
  tokenizers:
    - type: "bpe"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "morpho_bpe"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "wordpiece"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "character_bert"
      vocab_sizes: [null]
      params:
        max_char_len: 50
        max_word_vocab: 50000
    - type: "char_jaber"
      vocab_sizes: [null]
      params: {}
  tasks:
    - type: "acva"
      params:
        dataset_name: "OALL/ACVA"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "alghafa"
      params:
        dataset_name: "OALL/AlGhafa-Arabic-LLM-Benchmark-Native"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "culture_arabic_mmlu"
      params:
        dataset_name: "OALL/Arabic_MMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "arabic_exam"
      params:
        dataset_name: "MBZUAI/ArabicMMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42
