# Smoke-scale variant of native_llama_3phase_with_sft (50 steps per phase).
# Validates the full pipeline end-to-end on real data + real model before
# launching the full-step experiments. NOT meant for results — just wiring.

experiment:
  name: "_smoke_3phase"
  output_dir: "outputs/experiments/_smoke_3phase"
  seed: 42

tokenizer:
  type: "native_llama"
  vocab_size: null
  load_path: null
  save_path: "outputs/tokenizers/native_llama"

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

data:
  max_train_samples: 200       # tiny corpus for tokenizer-training step
  max_eval_samples: 100

training:
  phases:
    embedding_alignment:
      steps: 50
      batch_size: 4
    warmup:
      steps: 50
      batch_size: 2
      gradient_accumulation_steps: 2
    sft:
      steps: 50
      batch_size: 2
      gradient_accumulation_steps: 2
      early_stopping:
        eval_every_n_steps: 25
        min_steps_before_stop: 10
        patience: 3

evaluation:
  intrinsic_metrics: true
  morphological_metrics: false   # skip Farasa/qalsadi for smoke speed
  downstream_metrics: true
  num_eval_samples: 30           # tiny eval set so a benchmark pass is seconds
  failure_reports: false
  score_normalization: "char"

sweep:
  tokenizers:
    - type: "native_llama"
      vocab_sizes: [null]
  tasks:
    - type: "acva"
      params: {}
