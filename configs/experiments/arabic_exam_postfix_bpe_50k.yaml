# Post-fix re-run of bpe_50k+SFT — arabic_exam only.
#
# Reuses the trained BPE-50K tokenizer from outputs/tokenizers/bpe_50k via
# load_path so we don't retrain. SFT runs on the corrected 10 % split, eval
# on the corrected 90 % split (no All-config duplication, Context rendered,
# Option 5 / Answer=E recovered, is_few_shot filtered). Pre-fix accuracy was
# 0.2994 on 25982 examples.
#
# Single-experiment form (not sweep) because SweepTokenizerConfig does not
# expose load_path.

experiment:
  name: "arabic_exam_postfix_bpe_50k"
  description: >
    Arabic_Exam-only re-run with the trained BPE-50K from-scratch tokenizer
    + 10/90 SFT, after the parser fix. Reuses outputs/tokenizers/bpe_50k.
    Pairs with outputs/experiments/benchmark_sweep/bpe_50k_arabic_exam/ for
    the pre-fix baseline.
  output_dir: "outputs/experiments/arabic_exam_postfix_bpe_50k"
  seed: 42

data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

tokenizer:
  type: "bpe"
  vocab_size: 50000
  params:
    min_frequency: 2
  save_path: "outputs/tokenizers/bpe_50k"
  load_path: "outputs/tokenizers/bpe_50k"

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

task:
  type: "arabic_exam"
  params:
    dataset_name: "MBZUAI/ArabicMMLU"
    dataset_config: null
    train_split_ratio: 0.10
    max_length: 512
    seed: 42

training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3
  ft:
    enabled: true

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null
  failure_reports: true
