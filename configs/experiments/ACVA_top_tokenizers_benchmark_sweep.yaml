# Full-coverage benchmark sweep: all 8 tokenizers × 4 LightEval benchmarks.
#
# Excludes text_generation and question_answering tasks per project decision —
# only the LightEval log-likelihood MCQ benchmarks (ACVA, Alghafa,
# Culture-Arabic-MMLU, Arabic-Exam) are run. Failure-case CSVs are written
# per-task under each experiment's failure_reports/ directory.
#
# Fine-tuning: 10 % of each benchmark dataset (SFT on MCQ prompts).
# Evaluation:  90 % of each benchmark dataset via LightEval log-likelihood scoring.
# Metric:      accuracy (argmax over per-choice log-likelihoods) + per-failure CSV.

experiment:
  name: "ACVA_top_tokenizers_benchmark_sweep"
  description: >
    All 8 tokenizers (BPE, WordPiece, MorphoBPE, CharacterBERT,
    FarasaCharacterBERT, char-JABER, Charformer, AraRooPat) evaluated on the
    4 LightEval Arabic benchmarks. Subword tokenizers run at 16K/32K/50K vocab;
    character-level / byte-level / morpheme-vocab tokenizers run once with
    their fixed vocab. Failure-case CSVs are written for every (tokenizer,
    benchmark) combination.
  output_dir: "outputs/experiments/ACVA_top_tokenizers_benchmark_sweep"
  seed: 42

# Main Arabic corpus — used only for tokenizer training and intrinsic metrics.
data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  num_epochs: 3
  # Smaller batch to accommodate longer MCQ prompts.
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null      # use all 90 % examples for final evaluation
  failure_reports: true       # write per-task accuracy_failures CSVs

sweep:
  tokenizers:
    - type: "bpe"
      vocab_sizes: [50000]
      params:
        min_frequency: 2

    - type: "wordpiece"
      vocab_sizes: [50000]
      params:
        min_frequency: 2

    - type: "morpho_bpe"
      vocab_sizes: [50000]
      params:
        min_frequency: 2

    - type: "character_bert"
      vocab_sizes: [null]
      params:
        max_char_len: 50
        max_word_vocab: 50000

    - type: "farasa_character_bert"
      vocab_sizes: [null]
      params:
        max_char_len: 25       # morphemes are shorter than whole words
        max_word_vocab: 50000  # output-head vocab over morphemes

    - type: "char_jaber"
      vocab_sizes: [null]
      params: {}

    - type: "charformer"
      vocab_sizes: [null]      # fixed 260 ids (256 bytes + 4 specials)
      params:
        max_block_size: 4
        downsample_rate: 2
        conv_kernel_size: 5
        block_attention: false

    - type: "araroopat"
      vocab_sizes: [null]      # derived from max_roots + max_patterns
      params:
        # Balanced tier (~10.7K vocab, ~94% coverage). See configs/tokenizers/araroopat.yaml.
        max_roots: 10000
        max_patterns: 500
        min_root_freq: 2
        min_pattern_freq: 2
        generator_timeout_ms: 50
        use_diacritized_surface: false
        cache_corpus_analysis: true
        add_bos_eos: true

  tasks:
    - type: "acva"
      params:
        dataset_name: "OALL/ACVA"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42
