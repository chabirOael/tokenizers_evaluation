# Post-fix re-run of baseline (b) — arabic_exam only.
#
# Native Llama tokenizer + pretrained weights + 10/90 SFT pipeline, evaluated
# on the cleaned arabic_exam eval split. Pre-fix accuracy was 0.4217 on 25962
# examples (eval set 2×-inflated by All-config duplication, contaminated by
# SFT/eval leakage across the All vs subject groups).

experiment:
  name: "arabic_exam_postfix_native_with_sft"
  description: >
    Arabic_Exam-only re-run with native Llama tokenizer + 10/90 SFT, after
    the parser fix. Pairs with
    outputs/experiments/native_llama_with_sft_benchmark_sweep/native_llama_arabic_exam/
    for the pre-fix baseline.
  output_dir: "outputs/experiments/arabic_exam_postfix_native_with_sft"
  seed: 42

data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3
  ft:
    enabled: true

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null
  failure_reports: true

sweep:
  tokenizers:
    - type: "native_llama"
      vocab_sizes: [null]
      params:
        model_name_or_path: "meta-llama/Llama-3.2-1B"

  tasks:
    - type: "arabic_exam"
      params:
        dataset_name: "MBZUAI/ArabicMMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42
