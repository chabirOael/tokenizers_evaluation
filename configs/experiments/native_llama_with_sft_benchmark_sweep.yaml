# Baseline (b): native Llama tokenizer + native pretrained weights, WITH SFT.
#
# Same as native_llama_no_sft_benchmark_sweep but with training.ft.enabled=true.
# Answers: "what does the pretrained model do on these benchmarks after our
# 10/90 SFT pipeline, with the most informative tokenizer?"
#
# Comparison axes:
#   (a) vs (b) — does our 10 % SFT help / wash / hurt these benchmarks?
#   (b) vs the existing 50K from-scratch sweep — cost of using a 50K
#       from-scratch tokenizer instead of the native 128K one, controlling
#       for the SFT pipeline.
#
# Hyperparameters mirror ACVA_top_tokenizers_benchmark_sweep so the comparison
# to existing data is apples-to-apples.

experiment:
  name: "native_llama_with_sft_benchmark_sweep"
  description: >
    Native Llama-3.2 tokenizer + pretrained weights + same SFT pipeline as the
    existing 50K sweep, evaluated on the 4 LightEval Arabic benchmarks.
    Embedding/lm_head untouched (vocab matches → resize is a no-op); the
    pretrained rows are preserved. Isolates the cost of the from-scratch
    tokenizer choice in the existing sweep.
  output_dir: "outputs/experiments/native_llama_with_sft_benchmark_sweep"
  seed: 42

data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3
  ft:
    enabled: true   # default; explicit for clarity vs. baseline (a)

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null      # full 90 % eval split
  failure_reports: true

sweep:
  tokenizers:
    - type: "native_llama"
      vocab_sizes: [null]      # pretrained vocab is fixed at 128256
      params:
        model_name_or_path: "meta-llama/Llama-3.2-1B"

  tasks:
    - type: "acva"
      params:
        dataset_name: "OALL/ACVA"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "alghafa"
      params:
        dataset_name: "OALL/AlGhafa-Arabic-LLM-Benchmark-Native"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "culture_arabic_mmlu"
      params:
        dataset_name: "OALL/Arabic_MMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "arabic_exam"
      params:
        dataset_name: "MBZUAI/ArabicMMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42
