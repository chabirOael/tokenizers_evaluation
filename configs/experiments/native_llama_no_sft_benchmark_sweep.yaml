# Baseline (a): native Llama tokenizer + native pretrained weights, NO SFT.
#
# Answers: "what does the pretrained model do raw on these benchmarks?"
# Embedding/lm_head are untouched because vocab matches the model's
# (resize_token_embeddings(128256) is a no-op when current size already equals
# new size — see src/arabic_eval/models/embeddings/standard.py).
#
# If ACVA accuracy here lands at majority-class (≈0.5957) with collapsed
# wrong-prediction distribution, that confirms the label-noise-is-the-ceiling
# claim independent of any of our pipeline code paths. For the other three
# benchmarks this measures the pretrained-model ceiling.
#
# Pairs with native_llama_with_sft_benchmark_sweep.yaml (baseline b) and
# ACVA_top_tokenizers_benchmark_sweep / 50K from-scratch sweeps.

experiment:
  name: "native_llama_no_sft_benchmark_sweep"
  description: >
    Pretrained-model ceiling: Llama-3.2-1B with its native tokenizer, NO SFT,
    evaluated on the 4 LightEval Arabic benchmarks. Tells us how much of the
    existing sweep's accuracy is from the pipeline vs. from the model's
    pretraining.
  output_dir: "outputs/experiments/native_llama_no_sft_benchmark_sweep"
  seed: 42

data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  # Hyperparameters match ACVA_top_tokenizers_benchmark_sweep so the with-SFT
  # baseline is a drop-in comparison. ft.enabled=false skips step 6 entirely;
  # the other fields are inert.
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3
  ft:
    enabled: false   # the flag under test for baseline (a)

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null      # full 90 % eval split
  failure_reports: true

sweep:
  tokenizers:
    - type: "native_llama"
      vocab_sizes: [null]      # pretrained vocab is fixed at 128256
      params:
        model_name_or_path: "meta-llama/Llama-3.2-1B"

  tasks:
    - type: "acva"
      params:
        dataset_name: "OALL/ACVA"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "alghafa"
      params:
        dataset_name: "OALL/AlGhafa-Arabic-LLM-Benchmark-Native"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "culture_arabic_mmlu"
      params:
        dataset_name: "OALL/Arabic_MMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "arabic_exam"
      params:
        dataset_name: "MBZUAI/ArabicMMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42
