# SFT data-size ablation on ACVA.
#
# Paired with outputs/experiments/ACVA_top_tokenizers_benchmark_sweep/ as the
# baseline. The only change vs that sweep is task.params.train_split_ratio
# bumped from 0.10 -> 0.50, plus a reduced tokenizer set (bpe_50k only) for
# fast iteration. Completion-only loss is OFF (the legacy default), so this
# isolates SFT data size as the variable.
#
# Hypothesis under test: ablation A (completion-only loss alone) failed to
# break the always-class collapse on ACVA. The next-most-likely binding
# constraint is SFT data starvation -- 902 rows split across 58 sub-configs is
# ~16 rows/domain. Bumping the SFT cut to 0.50 (~4500 rows / 58 configs ~= 78
# rows/domain) gives the model meaningfully more answer-token signal at the
# cost of shrinking the held-out eval to the remaining 50 %. The 50 % eval is
# still the same fixed partition (per-config CRC32 seeds), so accuracy is
# comparable to the 0.10/0.90 baseline modulo eval-set size.

experiment:
  name: "ACVA_split_ratio_ablation"
  description: >
    SFT data-size ablation: BPE-50k on ACVA, train_split_ratio bumped to 0.50.
    Completion-only loss disabled. All other hyperparameters identical to
    ACVA_top_tokenizers_benchmark_sweep so the comparison isolates SFT data
    size as the only variable.
  output_dir: "outputs/experiments/ACVA_split_ratio_ablation"
  seed: 42

data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3
  completion_only_loss: false

evaluation:
  intrinsic_metrics: true
  morphological_metrics: true
  morph_sample_size: 500
  downstream_metrics: true
  num_eval_samples: null      # full held-out eval split (now 50 %)
  failure_reports: true

sweep:
  tokenizers:
    - type: "bpe"
      vocab_sizes: [50000]
      params:
        min_frequency: 2

  tasks:
    - type: "acva"
      params:
        dataset_name: "OALL/ACVA"
        dataset_config: null
        # The flag under test.
        train_split_ratio: 0.50
        max_length: 512
        seed: 42
