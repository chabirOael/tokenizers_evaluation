# Benchmark sweep: all 5 tokenizer families × 4 LightEval benchmarks.
#
# Fine-tuning: 10 % of each benchmark dataset (SFT on MCQ prompts).
# Evaluation:  90 % of each benchmark dataset via LightEval log-likelihood scoring.
# Metric:      accuracy (argmax over per-choice log-likelihoods).

experiment:
  name: "benchmark_sweep"
  description: >
    Evaluate tokenizer training choices on ACVA, Alghafa, Culture-Arabic-MMLU,
    and Arabic-Exam using the LightEval framework.  Each model is fine-tuned on
    a randomly selected 10 % subset of the benchmark data; the remaining 90 % is
    used for evaluation.
  output_dir: "outputs/experiments/benchmark_sweep"
  seed: 42

# Main Arabic corpus — used only for tokenizer training and intrinsic metrics.
data:
  dataset_name: "Jr23xd23/ArabicText-Large"
  cache_dir: "outputs/data_cache"
  max_train_samples: null
  max_eval_samples: 5000
  preprocessing:
    normalize_unicode: true
    remove_diacritics: false
    min_text_length: 10

model:
  type: "llama"
  name_or_path: "meta-llama/Llama-3.2-1B"
  dtype: "bfloat16"
  device: "auto"

training:
  num_epochs: 3
  # Smaller batch to accommodate longer MCQ prompts.
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  save_steps: 200
  eval_steps: 200
  logging_steps: 50
  save_total_limit: 2
  early_stopping_patience: 3

evaluation:
  intrinsic_metrics: true
  downstream_metrics: true
  num_eval_samples: null   # use all 90 % examples for final evaluation

sweep:
  tokenizers:
    - type: "bpe"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "wordpiece"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "morpho_bpe"
      vocab_sizes: [16000, 32000, 50000]
      params:
        min_frequency: 2
    - type: "character_bert"
      vocab_sizes: [null]
      params:
        max_char_len: 50
        max_word_vocab: 50000
    - type: "char_jaber"
      vocab_sizes: [null]
      params: {}

  tasks:
    - type: "acva"
      params:
        dataset_name: "OALL/ACVA"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "alghafa"
      params:
        dataset_name: "OALL/AlGhafa-Arabic-LLM-Benchmark-Native"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "culture_arabic_mmlu"
      params:
        dataset_name: "OALL/Arabic_MMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42

    - type: "arabic_exam"
      params:
        dataset_name: "MBZUAI/ArabicMMLU"
        dataset_config: null
        train_split_ratio: 0.10
        max_length: 512
        seed: 42
